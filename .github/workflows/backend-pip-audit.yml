# Dependency vulnerability scan for the FastAPI backend (supply-chain hygiene).
name: Backend pip-audit

on:
  push:
    paths:
      - "backend/requirements.txt"
      - ".github/workflows/backend-pip-audit.yml"
  pull_request:
    paths:
      - "backend/requirements.txt"
      - ".github/workflows/backend-pip-audit.yml"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend requirements
        run: pip-audit -r backend/requirements.txt --desc on
